name: 提取内核偏移量

on:
  workflow_dispatch:
  push:
    paths:
      - auto_extract_offsets.py

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 安装系统依赖
      run: sudo apt-get update && sudo apt-get install -y python3 python3-pip wget unzip

    - name: 安装 Python 依赖
      run: pip3 install vmlinux-to-elf

    - name: 从远程下载 boot.img
      run: |
        wget -q --show-progress https://r2.262832.xyz/raw/boot/boot.img -O boot.img
        if [ ! -f boot.img ]; then
          echo "错误：boot.img 下载失败"
          exit 1
        fi
        echo "boot.img 下载成功，大小：$(du -h boot.img | cut -f1)"

    - name: 运行偏移提取脚本并移动 target.h 到根目录
      run: |
        python3 auto_extract_offsets.py boot.img -o . --device blazer --target-name target --keep-intermediate
        if [ -f target/target.h ]; then
          mv target/target.h ./target.h
        else
          echo "错误：target.h 未生成"
          exit 1
        fi

    - name: 上传 target.h 作为 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: target-h
        path: target.h
        if-no-files-found: error